<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inscrição de equipe</title>
  <style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; padding: 0; }

  .page-bg {
    min-height: 600px;
    border-radius: 12px;
    padding: 30px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: url('https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?w=900&q=80');
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .page-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: rgba(0,30,10,0.55);
  }
  .form-wrap {
    position: relative;
    z-index: 1;
    background: rgba(200,220,235,0.92);
    border-radius: 12px;
    padding: 20px 22px;
    width: 100%;
    max-width: 480px;
    border: 1.5px solid #b0c4d4;
    backdrop-filter: blur(2px);
  }
  .form-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 17px;
    font-weight: 500;
    color: #1a2a3a;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid #a0b4c8;
    font-family: sans-serif;
  }
  .icon-soccer {
    background: #e0eef8;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid #a0b4c8;
    font-size: 17px;
  }
  .fields-box {
    background: rgba(210,230,245,0.85);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border: 1px solid #b8cce0;
  }
  .field-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
    font-family: sans-serif;
  }
  .field-row:last-child { margin-bottom: 0; }
  .field-label {
    font-size: 13px;
    color: #1a2a3a;
    min-width: 80px;
    font-weight: 500;
    padding-top: 5px;
  }
  .field-col {
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 3px;
  }
  .field-input {
    width: 100%;
    height: 26px;
    border-radius: 4px;
    border: 1px solid #a8bfd4;
    background: #f2f8fc;
    padding: 0 8px;
    font-size: 13px;
    color: #1a2a3a;
    outline: none;
    font-family: sans-serif;
  }
  .field-input:focus { border-color: #5a8ab0; background: #fff; }
  .hint {
    font-size: 11px;
    color: #3a5a6a;
    font-family: sans-serif;
    line-height: 1.3;
  }
  .curso-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    padding-top: 2px;
  }
  .field-select {
    height: 26px;
    border-radius: 4px;
    border: 1px solid #a8bfd4;
    background: #f2f8fc;
    padding: 0 6px;
    font-size: 13px;
    color: #1a2a3a;
    font-family: sans-serif;
  }
  .turma-label {
    font-size: 13px;
    color: #1a2a3a;
    font-weight: 500;
    font-family: sans-serif;
  }
  .participantes-box {
    background: rgba(210,230,245,0.85);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border: 1px solid #b8cce0;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .participantes-inner { flex: 1; }
  .participantes-header {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 10px;
  }
  .participantes-header span {
    font-size: 14px;
    font-weight: 500;
    color: #1a2a3a;
    font-family: sans-serif;
  }
  .checkbox-green { width: 15px; height: 15px; accent-color: #2e7d32; }
  .col-header { display: flex; gap: 8px; margin-bottom: 4px; }
  .col-label {
    font-size: 12px;
    color: #1a2a3a;
    font-weight: 500;
    font-family: sans-serif;
  }
  .col-label.nome { flex: 1.1; }
  .col-label.mat { flex: 1; }
  .player-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .player-input {
    height: 25px;
    border-radius: 4px;
    border: 1px solid #a8bfd4;
    background: #f2f8fc;
    padding: 0 7px;
    font-size: 13px;
    color: #1a2a3a;
    font-family: sans-serif;
  }
  .player-input:focus { border-color: #5a8ab0; background: #fff; outline: none; }
  .player-input.nome { flex: 1.1; }
  .player-input.mat { flex: 1; }
  .ball-side {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 22px;
  }
  .ball-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, #e8f5e8, #c8e8c8);
    border: 3px solid #2e7d32;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 0 5px rgba(46,125,50,0.18);
  }
  .add-placeholder {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #e0eef8;
    border: 1px solid #a0b8d0;
    border-radius: 4px;
    padding: 4px 11px;
    font-size: 13px;
    color: #1a3050;
    font-family: sans-serif;
    margin-top: 2px;
    cursor: pointer;
  }
  .regulamento-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 12px;
    font-family: sans-serif;
  }
  .regulamento-row label { font-size: 13px; color: #1a2a3a; }
  .submit-btn {
    display: block;
    width: 100%;
    height: 40px;
    background: #2e7d32;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: sans-serif;
    letter-spacing: 0.3px;
  }
  .submit-btn:hover { background: #256028; }
  .submit-btn:active { transform: scale(0.99); }
  </style>
</head>
<body>

<div class="page-bg">
  <div class="form-wrap">
    <div class="form-title">
      <div class="icon-soccer">⚽</div>
      Inscrição de equipe
    </div>

    <div class="fields-box">
      <div class="field-row">
        <span class="field-label">Nome da equipe</span>
        <div class="field-col">
          <input class="field-input" type="text" name="nome_equipe" placeholder="Ex.: Guerreiros FC" aria-label="Nome da equipe" />
        </div>
      </div>

      <div class="field-row">
        <span class="field-label">Curso</span>
        <div class="curso-row">
          <select class="field-select" name="curso" aria-label="Curso">
            <option>ADSI</option>
            <option>Informática</option>
            <option>Redes</option>
          </select>
          <span class="turma-label">Turma</span>
          <select class="field-select" name="turma" aria-label="Turma">
            <option>3º Ano</option>
            <option>1º Ano</option>
            <option>2º Ano</option>
          </select>
        </div>
      </div>

      <div class="field-row">
        <span class="field-label">Capitão</span>
        <div class="field-col">
          <input class="field-input" type="text" name="capitao" placeholder="Ex.: João Silva" aria-label="Nome do capitão" />
        </div>
      </div>

      <div class="field-row">
        <span class="field-label">E-mail</span>
        <div class="field-col">
          <input class="field-input" type="email" name="email" placeholder="nome@exemplo.com" aria-label="E-mail de contato" />
          <span class="hint">Usaremos este e-mail para contato sobre a inscrição.</span>
        </div>
      </div>

      <div class="field-row">
        <span class="field-label">Telefone</span>
        <div class="field-col">
          <input class="field-input" type="tel" name="telefone" placeholder="(99) 99999-9999" aria-label="Telefone/WhatsApp" />
          <span class="hint">Informe o WhatsApp do capitão para contato rápido.</span>
        </div>
      </div>
    </div>

    <div class="participantes-box">
      <div class="participantes-inner">
        <div class="participantes-header">
          <input type="checkbox" class="checkbox-green" checked id="inclui_participantes" />
          <label for="inclui_participantes"><span>Participantes</span></label>
        </div>
        <div class="col-header">
          <span class="col-label nome">Nome</span>
          <span class="col-label mat">Matrícula</span>
        </div>
        <div class="player-row">
          <input class="player-input nome" type="text" name="participante_1_nome" value="João Silva" aria-label="Nome do participante 1" />
          <input class="player-input mat" type="text" name="participante_1_mat" value="20231234" aria-label="Matrícula do participante 1" />
        </div>
        <div class="player-row">
          <input class="player-input nome" type="text" name="participante_2_nome" value="Pedro Souza" aria-label="Nome do participante 2" />
          <input class="player-input mat" type="text" name="participante_2_mat" value="20231236" aria-label="Matrícula do participante 2" />
        </div>
        <div class="add-placeholder">+ Adicionar jogador</div>
      </div>
      <div class="ball-side">
        <div class="ball-circle">⚽</div>
      </div>
    </div>

    <div class="regulamento-row">
      <input type="checkbox" class="checkbox-green" checked id="reg" />
      <label for="reg">Aceito o regulamento</label>
    </div>

    <button class="submit-btn">Enviar inscrição</button>
  </div>
</div>

</body>
</html>
